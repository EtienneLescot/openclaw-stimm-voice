name: Tag and Publish

# When the release PR is merged, its commit message is "chore: release X.Y.Z".
# This workflow detects that pattern, creates the tag AND publishes to npm in
# one job — avoiding the GitHub Actions restriction that prevents GITHUB_TOKEN
# tag pushes from triggering downstream workflows.

on:
    push:
        branches: [main]

jobs:
    tag-and-publish:
        if: "startsWith(github.event.head_commit.message, 'chore: release')"
        runs-on: ubuntu-latest
        permissions:
            contents: write
            id-token: write  # Required for npm OIDC trusted publishing

        steps:
            - uses: actions/checkout@v4

            - name: Read version from package.json
              id: pkg
              run: |
                  VERSION=$(node -p "require('./package.json').version")
                  echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

            - name: Create and push tag
              run: |
                  git config user.name  "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git tag "v${{ steps.pkg.outputs.version }}"
                  git push origin "v${{ steps.pkg.outputs.version }}"

            - uses: actions/setup-node@v4
              with:
                  node-version: 22

            - name: Upgrade npm for OIDC trusted publishing
              run: npm install -g npm@^11.5.1

            - run: |
                  # Ensure no local .npmrc exists or that it's clean
                  [ -f .npmrc ] && rm .npmrc
                  # Explicitly unset any env-injected auth tokens that setup-node might have left
                  unset NODE_AUTH_TOKEN
                  # Verify we are in OIDC mode by checking the existence of GITHUB_OUTPUT (standard)
                  npm config list

            - run: npm install

            - name: Publish to npm
              # provenance requires OIDC. access public is mandatory for first publish usually.
              run: npm publish --provenance --access public --tag latest --registry https://registry.npmjs.org/
