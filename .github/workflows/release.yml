name: Release

on:
    workflow_dispatch:
        inputs:
            prerelease:
                description: 'Pre-release label (e.g. beta.1). Leave empty for stable.'
                required: false
                default: ''

permissions:
    contents: write

jobs:
    release:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-tags: true
                  fetch-depth: 0

            - name: Compute next CalVer
              id: calver
              run: |
                  YEAR=$(date -u +%Y)
                  MONTH=$(date -u +%-m)
                  BASE="${YEAR}.${MONTH}"

                  # Find highest patch for this year.month across all tags (vYYYY.M.P*)
                  LAST_PATCH=$(git tag --list "v${BASE}.*" \
                    | sed "s/^v${BASE}\.\([0-9]*\).*/\1/" \
                    | sort -n | tail -1)

                  PATCH=$(( ${LAST_PATCH:-0} + 1 ))

                  VERSION="${BASE}.${PATCH}"
                  PRERELEASE="${{ github.event.inputs.prerelease }}"
                  if [[ -n "$PRERELEASE" ]]; then
                    VERSION="${VERSION}-${PRERELEASE}"
                  fi

                  echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
                  echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"

            - name: Bump package.json
              run: |
                  VERSION="${{ steps.calver.outputs.version }}"
                  node -e "
                    const fs = require('fs');
                    const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
                    pkg.version = '$VERSION';
                    fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
                  "

            - name: Commit, tag and push
              run: |
                  git config user.name  "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git add package.json
                  git commit -m "chore: release ${{ steps.calver.outputs.version }}"
                  git tag "${{ steps.calver.outputs.tag }}"
                  git push origin main --follow-tags
